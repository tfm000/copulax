name: pytest

on:
  push:
  pull_request:
    branches: [main]

jobs:
  package-install:
    name: package install py${{ matrix.python-version }} on ubuntu
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Build and install package
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
          python -m pip install --force-reinstall dist/*.whl
          python -c "import copulax; print('import ok')"
          python -m pip check
      - name: Verify wheel does not ship the test suite
        run: |
          python - <<'EOF'
          import zipfile, glob, sys
          wheels = glob.glob("dist/copulax-*.whl")
          if len(wheels) != 1:
              print(f"::error::Expected exactly one wheel, found {len(wheels)}: {wheels}")
              sys.exit(1)
          (wheel,) = wheels
          with zipfile.ZipFile(wheel) as zf:
              leaks = [n for n in zf.namelist() if n.startswith("copulax/tests/")]
          if leaks:
              print(f"::error::Wheel ships test files: {leaks[:5]}")
              sys.exit(1)
          print(f"OK: {wheel} contains no copulax/tests/ entries")
          EOF
      - name: Verify sdist ships the test suite
        run: |
          python - <<'EOF'
          import tarfile, glob, sys
          sdists = glob.glob("dist/copulax-*.tar.gz")
          if len(sdists) != 1:
              print(f"::error::Expected exactly one sdist, found {len(sdists)}: {sdists}")
              sys.exit(1)
          (sdist,) = sdists
          with tarfile.open(sdist) as tf:
              names = tf.getnames()
          tests = [n for n in names if "/copulax/tests/" in n and n.endswith(".py")]
          if not tests:
              print(f"::error::Sdist {sdist} contains no test files; expected MANIFEST.in to include them")
              sys.exit(1)
          print(f"OK: sdist contains {len(tests)} test files")
          EOF
      - name: Release smoke test (exercise each subpackage from wheel install)
        run: python scripts/release_smoke_test.py

  pytest:
    name: py${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"
      - name: Test with pytest
        run: |
          pytest -vs copulax/tests/ -m "not slow"
